name: http-verify

# Post-deploy verification against the production URL. Asserts the
# protocol stack CLAUDE.md promises: TLS 1.3, HTTP/3 advertised and
# working, Brotli served, immutable cache on hashed assets, and ETag
# revalidation returning 304 on unchanged HTML.
#
# The schedule trigger is intentionally disabled until the Cloudflare
# Pages deployment cuts over (#3, #4, #6). Enable by uncommenting the
# schedule block once https://blog.szypowi.cz/ serves real content.

on:
  workflow_dispatch:
    inputs:
      url:
        description: URL to verify
        required: false
        default: https://blog.szypowi.cz/
  # schedule:
  #   - cron: '*/30 * * * *'

permissions:
  contents: read

concurrency:
  group: http-verify
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Check curl HTTP/3 support
        run: |
          curl --version
          curl --version | grep -Eq 'ngtcp2|nghttp3|HTTP3' \
            || { echo "::error::curl on this runner lacks HTTP/3 support"; exit 2; }

      - name: Run http-verify
        run: scripts/http-verify.sh '${{ inputs.url || 'https://blog.szypowi.cz/' }}'
