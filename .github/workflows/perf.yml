name: perf

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: perf-${{ github.ref }}
  cancel-in-progress: true

env:
  HUGO_VERSION: '0.160.1'

jobs:
  budget:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 1
      - name: Install Hugo extended
        run: |
          curl -fsSL "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz" -o hugo.tar.gz
          curl -fsSL "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_${HUGO_VERSION}_checksums.txt" -o hugo_checksums.txt
          grep "hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz" hugo_checksums.txt | sha256sum -c -
          tar xzf hugo.tar.gz hugo
          sudo mv hugo /usr/local/bin/hugo
          rm hugo.tar.gz hugo_checksums.txt
          hugo version
      - name: Install brotli
        run: sudo apt-get update && sudo apt-get install -y brotli
      - name: Enforce performance budgets
        run: scripts/budget.sh

  lighthouse:
    runs-on: ubuntu-latest
    needs: budget
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 1
      - name: Install Hugo extended
        run: |
          curl -fsSL "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz" -o hugo.tar.gz
          curl -fsSL "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_${HUGO_VERSION}_checksums.txt" -o hugo_checksums.txt
          grep "hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz" hugo_checksums.txt | sha256sum -c -
          tar xzf hugo.tar.gz hugo
          sudo mv hugo /usr/local/bin/hugo
          rm hugo.tar.gz hugo_checksums.txt
          hugo version
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - name: Install lhci + lighthouse
        run: npm install -g @lhci/cli lighthouse
      - name: Install brotli
        run: sudo apt-get update && sudo apt-get install -y brotli
      - name: Run Lighthouse CI (local config)
        env:
          CHROME_PATH: /usr/bin/google-chrome
        run: scripts/lighthouse.sh
