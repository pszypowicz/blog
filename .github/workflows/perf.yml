name: perf

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: perf-${{ github.ref }}
  cancel-in-progress: true

env:
  HUGO_VERSION: '0.160.1'

jobs:
  budget:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          fetch-depth: 1
      - name: Install Hugo extended
        uses: ./.github/actions/install-hugo
        with:
          version: ${{ env.HUGO_VERSION }}
      - name: Install brotli
        run: sudo apt-get update && sudo apt-get install -y brotli
      - name: Enforce performance budgets
        run: scripts/budget.sh
      - name: Single-flight bench
        run: scripts/bench.sh

  lighthouse:
    runs-on: ubuntu-latest
    needs: budget
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          fetch-depth: 1
      - name: Install Hugo extended
        uses: ./.github/actions/install-hugo
        with:
          version: ${{ env.HUGO_VERSION }}
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444  # v5.0.0
        with:
          node-version: '22'
      - name: Install lhci + lighthouse
        run: npm install -g @lhci/cli lighthouse
      - name: Install brotli
        run: sudo apt-get update && sudo apt-get install -y brotli
      - name: Run Lighthouse CI (local config)
        env:
          CHROME_PATH: /usr/bin/google-chrome
        run: scripts/lighthouse.sh
