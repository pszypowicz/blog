name: perf

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: perf-${{ github.ref }}
  cancel-in-progress: true

env:
  HUGO_VERSION: '0.160.1'

jobs:
  budget:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          submodules: recursive
          fetch-depth: 1
      - name: Install Hugo extended
        run: |
          TARBALL="hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          curl -fsSL "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/${TARBALL}" -o "${TARBALL}"
          curl -fsSL "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_${HUGO_VERSION}_checksums.txt" -o hugo_checksums.txt
          grep "${TARBALL}" hugo_checksums.txt | sha256sum -c -
          tar xzf "${TARBALL}" hugo
          sudo mv hugo /usr/local/bin/hugo
          rm "${TARBALL}" hugo_checksums.txt
          hugo version
      - name: Install brotli
        run: sudo apt-get update && sudo apt-get install -y brotli
      - name: Enforce performance budgets
        run: scripts/budget.sh
      - name: Single-flight bench
        run: scripts/bench.sh

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          submodules: recursive
          fetch-depth: 1
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444  # v5.0.0
        with:
          node-version: '22'
          cache: npm
      - name: Install npm devDependencies
        # --ignore-scripts blocks postinstall hooks so a malicious
        # package-lock.json change cannot execute code during install.
        run: npm ci --include=dev --ignore-scripts
      - name: ESLint
        run: npm run lint
      - name: TypeScript check
        run: npm run typecheck

  lighthouse:
    runs-on: ubuntu-latest
    needs: budget
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          submodules: recursive
          fetch-depth: 1
      - name: Install Hugo extended
        run: |
          TARBALL="hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          curl -fsSL "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/${TARBALL}" -o "${TARBALL}"
          curl -fsSL "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_${HUGO_VERSION}_checksums.txt" -o hugo_checksums.txt
          grep "${TARBALL}" hugo_checksums.txt | sha256sum -c -
          tar xzf "${TARBALL}" hugo
          sudo mv hugo /usr/local/bin/hugo
          rm "${TARBALL}" hugo_checksums.txt
          hugo version
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444  # v5.0.0
        with:
          node-version: '22'
      - name: Install lhci + lighthouse
        run: npm install -g @lhci/cli lighthouse
      - name: Install brotli
        run: sudo apt-get update && sudo apt-get install -y brotli
      - name: Run Lighthouse CI (local config)
        env:
          CHROME_PATH: /usr/bin/google-chrome
        run: scripts/lighthouse.sh
