mainSections        = ["post"]
featuredImageField  = "image"
rssFullContent      = true
favicon             = ""

[footer]
    since      = 2020
    customText = ""

[dateFormat]
    published = "2006-01-02"
    lastUpdated = "2006-01-02 15:04 MST"

[article]
    math     = false
    toc      = false
    readingTime = true
    [article.license]
        enabled = false
        default = ""

[comments]
    enabled  = false
    provider = ""

[widgets]
    homepage = [
        { type = "search" },
        { type = "archives", params = { limit = 5 } },
        { type = "categories", params = { limit = 10 } },
        { type = "tag-cloud",  params = { limit = 10 } },
    ]
    page = [
        { type = "toc" },
    ]

[opengraph]
    [opengraph.twitter]
        site = ""
        card = "summary"

[colorScheme]
    toggle  = false
    default = "auto"

[imageProcessing]
    [imageProcessing.cover]
        enabled = false
    [imageProcessing.content]
        enabled = false
