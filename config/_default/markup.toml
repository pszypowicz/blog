[goldmark]
    [goldmark.renderer]
        unsafe = true

[highlight]
    noClasses       = false
    codeFences      = true
    guessSyntax     = true
    lineNoStart     = 1
    lineNos         = false
    lineNumbersInTable = true
    tabWidth        = 4

[tableOfContents]
    endLevel   = 4
    ordered    = false
    startLevel = 2
