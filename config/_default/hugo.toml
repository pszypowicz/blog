baseURL                = "https://blog.szypowi.cz/"
languageCode           = "en-us"
title                  = "blog.szypowi.cz"
defaultContentLanguage = "en"
hasCJKLanguage         = false

enableRobotsTXT = true
enableEmoji     = false
enableGitInfo   = false
buildDrafts     = false
buildFuture     = false
buildExpired    = false

[pagination]
    pagerSize = 20

[permalinks]
    post = "/p/:slug/"
    page = "/:slug/"

[related]
    includeNewer = true
    threshold    = 60
    toLower      = false
    [[related.indices]]
        name   = "tags"
        weight = 100
    [[related.indices]]
        name   = "categories"
        weight = 200

# Allow the modeline to read the build commit SHA. Cloudflare Pages auto-sets
# CF_PAGES_COMMIT_SHA; COMMIT_SHA lets local builds opt in via env var.
[security]
    [security.funcs]
        getenv = ['^HUGO_', '^CI$', '^CF_PAGES_', '^COMMIT_SHA$']
