{{/*
    Two-part stylesheet delivery.

    Critical CSS (above-the-fold skeleton) is inlined in <style> so the
    first network round-trip after TLS carries everything needed to
    paint. See CLAUDE.md "14 KB rule".

    Rest CSS (footer, pagination, widgets, listing variants, chroma
    syntax highlight) is emitted as a hashed external file and loaded
    non-blocking via the preload+onload swap; a <noscript> link covers
    scripting-disabled browsers. `_headers` sets
    `Cache-Control: public, max-age=31536000, immutable` on /*.css so
    subsequent page loads hit the browser cache without a revalidate.

    scripts/budget.sh treats any <link> carrying `onload=` as
    non-blocking and excludes it from the 14 KB measurement.
*/}}
{{- $critical := resources.Get "scss/critical.scss"
    | toCSS (dict "outputStyle" "compressed")
    | minify
    | fingerprint "sha256" -}}
<style>{{ $critical.Content | safeCSS }}</style>
{{- $rest := resources.Get "scss/rest.scss"
    | toCSS (dict "outputStyle" "compressed")
    | minify
    | fingerprint "sha256" -}}
<link rel="preload" href="{{ $rest.RelPermalink }}" as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="{{ $rest.RelPermalink }}"></noscript>
